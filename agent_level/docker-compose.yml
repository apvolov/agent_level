version: "3.9"

services:

  # ─── MinIO: объектное хранилище тайлов ───────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web-консоль  →  http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Инициализация бакета (создаём 'tiles' при первом старте) ─────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/tiles &&
        echo '✅ Бакет tiles готов'
      "

  # ─── Агентный уровень ────────────────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent
    ports:
      - "8000:8000"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: tiles
      MINIO_SECURE: "false"
      TRANSPORT_URL: http://192.168.196.115:8090
      SEGMENT_SIZE_BYTES: 100000   # 0.1 МБ
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ─── Заглушка транспортного уровня ───────────────────────────────────────────
  mock-transport:
    build:
      context: ./mock_transport
      dockerfile: Dockerfile
    container_name: mock-transport
    ports:
      - "8001:8001"
    restart: unless-stopped

volumes:
  minio_data:
